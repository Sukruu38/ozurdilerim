<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beni Affet... 🥺</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffeef2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        h1 {
            color: #d63031;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .gif-container {
            font-size: 50px;
            margin-bottom: 20px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            height: 50px;
            align-items: center;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }

        #yesBtn {
            background-color: #2ecc71;
            color: white;
        }

        #yesBtn:hover {
            transform: scale(1.1);
        }

        #noBtn {
            background-color: #e74c3c;
            color: white;
            position: absolute;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- İstersen emoji yerine internetten bulduğun tatlı bir GIF linki de koyabilirsin -->
        <div class="gif-container">🥺❤️</div>
        <h1 id="question">Benimle barışır mısın? Lütfen...</h1>
        
        <div class="buttons">
            <button id="yesBtn" onclick="baristik()">Evet</button>
            <button id="noBtn" onmouseover="kac()" onclick="kac()">Hayır</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const question = document.getElementById('question');
        const gifContainer = document.querySelector('.gif-container');

        // Hayır butonunun kaçma fonksiyonu
        function kac() {
            // Ekran boyut sınırlarını alıyoruz
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 50);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 50);
            
            // Butonu rastgele koordinatlara ışınlıyoruz
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        // Evet butonuna basınca ne olacak?
        function baristik() {
            question.innerHTML = "Oleyyy! Seni çok seviyorum! 🥰🎉";
            gifContainer.innerHTML = "💖🥳💃";
            noBtn.style.display = 'none'; // Hayır butonunu tamamen gizle
            yesBtn.style.transform = 'scale(1.3)';
        }
    </script>

</body>
</html>
