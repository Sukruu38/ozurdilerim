<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beni Affet...:( 🥺</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffeef2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 400px;
        }

        h1 {
            color: #d63031;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .gif-container {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            height: 60px;
            align-items: center;
        }

        button {
            padding: 12px 30px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.1s ease;
        }

        #yesBtn {
            background-color: #2ecc71;
            color: white;
        }

        #yesBtn:hover {
            transform: scale(1.1);
        }

        #noBtn {
            background-color: #e74c3c;
            color: white;
            position: absolute;
            /* İlk başta Evet butonunun sağında düzgün dursun diye sabitliyoruz */
            left: 55%; 
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="gif-container">🥺❤️</div>
        <h1 id="question">Benimle barışır mısın? Lütfen...</h1>
        
        <div class="buttons">
            <button id="yesBtn" onclick="baristik()">Evet</button>
            <!-- Fare her geldiğinde tetiklenmesi için tüm mouse eventlerini ekledik -->
            <button id="noBtn" onmouseover="kac()" onmouseenter="kac()" onclick="kac()">Hayır</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const question = document.getElementById('question');
        const gifContainer = document.querySelector('.gif-container');

        // Butonun ekrandan tamamen taşmaması için sınırları belirleyip ışınlıyoruz
        function kac() {
            const padding = 100; // Ekranın en kenarlarına sıkışmasın diye pay bırakıyoruz
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - padding) + padding / 2;
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - padding) + padding / 2;
            
            noBtn.style.position = 'fixed'; // Ekranın her yerine özgürce kaçabilsin
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        // Fare çok hızlı hareket ederse ve yakalarsa diye ekstra güvenlik (üzerine tıklandığı an yine kaçar)
        noBtn.addEventListener('click', (e) => {
            e.preventDefault();
            kac();
        });

        function baristik() {
            question.innerHTML = "Oleyyy! Seni çok seviyorum! 🥰🎉";
            gifContainer.innerHTML = "💖🥳💃";
            noBtn.style.display = 'none'; // Hayır butonunu yok et
            yesBtn.style.transform = 'scale(1.3)';
        }
    </script>

</body>
</html>
