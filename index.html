<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beni Affet... 🥺</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffeef2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        h1 {
            color: #d63031;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .gif-container {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
            flex-wrap: wrap; /* Buton büyüdükçe alt satıra geçebilsin diye */
        }

        button {
            padding: 12px 30px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease; /* Büyüme animasyonu yumuşak olsun diye */
        }

        #yesBtn {
            background-color: #2ecc71;
            color: white;
        }

        #noBtn {
            background-color: #e74c3c;
            color: white;
        }
    </style>
</head>
<body>

  <div class="container">
    <div class="gif-container">
        <img src="https://i.pinimg.com/originals/b2/79/66/b27966140db68d0621628f2309f8a443.gif" width="150" alt="Uzgun">
    </div>
</div>
        <h1 id="question">Benimle barışır mısın? Lütfen çok pişmanım seni çok özledim :(</h1>
        
        <div class="buttons">
            <button id="yesBtn" onclick="baristik()">Evet</button>
            <button id="noBtn" onclick="buyut()">Hayır</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const question = document.getElementById('question');
        const gifContainer = document.querySelector('.gif-container');

        let yesScale = 1; // Evet butonunun ilk büyüklük çarpanı
        let paddingX = 30; // İlk iç boşluk genişliği
        let paddingY = 12; // İlk iç boşluk yüksekliği
        let fontSize = 18;  // İlk yazı boyutu

        // Hayır butonuna her basıldığında Evet butonunu büyüten fonksiyon
        function buyut() {
            yesScale += 0.4; // Her basışta büyüme oranını artırır
            fontSize += 4;   // Yazıyı büyütür
            paddingX += 15;  // Buton genişliğini artırır
            paddingY += 8;   // Buton yüksekliğini artırır

            // Yeni boyutları Evet butonuna uyguluyoruz
            yesBtn.style.fontSize = `${fontSize}px`;
            yesBtn.style.padding = `${paddingY}px ${paddingX}px`;
            
            // Hayır butonuna basıldıkça üstteki soruyu da biraz panikletelim (İsteğe bağlı eğlence)
            const sitemler = [
                "Emin misin? 💔",
                "Bir daha düşünsen? 🥺",
                "Gerçekten mi? 😢",
                "Lütfen ama 😭",
                "Yoo, hayır diyemezsin! hihi"
            ];
            // Rastgele bir sitem cümlesi seçip yazdırıyoruz
            const rastgeleSitem = sitemler[Math.floor(Math.random() * sitemler.length)];
            question.innerHTML = rastgeleSitem;
        }

        // Nihayet Evet butonuna basınca ne olacak?
      function baristik() {
    // 1. Evet'e basınca çıkacak ilk yazı
    question.innerHTML = "Barıştık mı?! Seni çok seviyorum! ve seni üzmemek için her şeyi yapıcam 🥰🎉 ve sana bir teklifim var ";
    
    // 2. Evet'e basınca çıkacak ilk mutlu GIF (Düzgün img etiketi içine alındı)
    gifContainer.innerHTML = '<img src="https://supawork.ai/examples/gif-batch-page/dog-gif/smiling-dog-gif/gifs/demo2.gif" width="150" alt="Mutlu">';
    
    // Eski butonları gizliyoruz
    noBtn.style.display = 'none'; 
    yesBtn.style.display = 'none';

    // 3. "Teklifi görmek için tıkla" butonu oluşturuluyor (Fonksiyonun İÇİNE taşındı)
    const teklifBtn = document.createElement('button');
    teklifBtn.innerHTML = "Teklifi görmek için tıkla 👇";
    teklifBtn.style.backgroundColor = "#9b59b6"; // Mor renkli tatlı buton
    teklifBtn.style.color = "white";
    teklifBtn.style.marginTop = "20px";
    
    teklifBtn.onclick = function() {
        question.innerHTML = "Benimle Toy Story 5'e gelir misin? 🍿🎬"; 
        
        gifContainer.innerHTML = '<img src="https://media.tenor.com/C-ZraRpWG2sAAAAm/cat-flowers.gif" width="150" alt="Toy Story">';
        
        teklifBtn.style.display = 'none';
    };

    // Oluşturduğumuz mor butonu ekrandaki kutunun içine ekliyoruz
    document.querySelector('.buttons').appendChild(teklifBtn);
}
// function baristik burada bitiyor
</script>

</body>
</html>
